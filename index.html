<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learning Hub — Agent 驱动的可视化后端学习库，面经考点动画化" />
  <title>Learning Hub · 可视化学习库</title>
  <script src="shared/preferences.js"></script>
  <link rel="stylesheet" href="shared/player.css" />
  <link rel="stylesheet" href="shared/hub-docs.css" />
</head>
<body>
  <div class="vp-mask" id="sidebarMask"></div>

  <header class="vp-nav">
    <button class="vp-nav-hamburger" id="menuBtn" type="button" aria-label="打开菜单">☰</button>
    <a class="vp-nav-brand" href="#intro">
      <span class="logo">LH</span>
      Learning Hub
    </a>
    <div class="vp-nav-spacer"></div>
    <div class="vp-nav-links">
      <input class="vp-search" id="search" type="search" placeholder="搜索课程…" autocomplete="off" />
      <a class="vp-nav-link hide-sm" href="#interview">面经</a>
      <a class="vp-nav-link hide-sm" href="#fork">自建库</a>
      <a class="vp-nav-link" href="https://github.com/wqy8593521/learning-hub" target="_blank" rel="noopener">GitHub</a>
      <div id="prefMount"></div>
    </div>
  </header>

  <div class="vp-layout">
    <aside class="vp-sidebar" id="sidebar">
      <nav class="vp-sidebar-nav">
        <div class="vp-sidebar-group">
          <p class="vp-sidebar-group-title">指南</p>
          <div id="guideNav"></div>
        </div>
        <div class="vp-sidebar-group">
          <p class="vp-sidebar-group-title">课程</p>
          <div class="vp-sidebar-courses" id="courseNav">
            <div class="vp-sidebar-empty">加载中…</div>
          </div>
        </div>
      </nav>
    </aside>

    <div class="vp-main">
      <div class="vp-center">
        <div class="vp-doc-wrap" id="docWrap">
          <article class="vp-doc" id="doc">
            <h1>Learning Hub</h1>
            <p class="lead">加载中…</p>
          </article>
        </div>

        <div class="vp-lesson" id="lessonView" hidden>
          <header class="lesson-summary" id="lessonSummary"></header>
          <section class="vp-stage" id="playerPane">
            <div class="hub-embed" id="playerShell">
              <div class="lesson-viewport" id="embedViewport">
                <div class="viz-area"><svg id="embedSvg" viewBox="0 0 760 340"></svg></div>
                <aside class="code-panel" id="embedCodePanel" hidden>
                  <header class="code-panel-head">
                    <span class="code-panel-title">代码</span>
                    <span class="code-panel-lang" id="embedCodeLang">Java</span>
                    <button type="button" class="code-copy-btn" id="embedCodeCopy" title="复制代码">复制</button>
                  </header>
                  <div class="code-panel-body" id="embedCodeBody"></div>
                </aside>
                <div class="quiz-layer" id="embedQuizLayer"></div>
              </div>
              <div class="transport-dock" id="embedTransport">
                <div class="depth-row">
                  <button class="depth-btn on" data-d="0" type="button">L0 现象</button>
                  <button class="depth-btn" data-d="1" type="button">L1 机制</button>
                  <button class="depth-btn" data-d="2" type="button">L2 底层</button>
                </div>
                <div class="caption" id="embedCaption"></div>
                <div class="step-labels" id="embedStepLabels"></div>
                <input type="range" class="timeline" id="embedTimeline" min="0" value="0" />
                <div class="timeline-marks" id="embedTimeMarks"></div>
                <div class="transport">
                  <button class="btn btn-mode" id="embedModeBtn" type="button" title="自动/手动 (M)">自动</button>
                  <button class="btn btn-step" id="embedPrevBtn" type="button" title="上一帧 (←)" style="display:none">◀</button>
                  <button class="btn btn-step" id="embedNextBtn" type="button" title="下一帧 (→)" style="display:none">▶</button>
                  <button class="btn btn-play" id="embedPlayBtn" type="button">⏸</button>
                  <button class="btn btn-speed" id="embedSpeedBtn" type="button" title="倍速">1×</button>
                  <button class="btn btn-fs" id="embedFullscreenBtn" type="button" title="全屏">⛶</button>
                  <button class="btn btn-narrate" id="embedNarrateBtn" type="button" title="旁白 (N)">🔇</button>
                  <button class="btn btn-quiz-mode" id="embedQuizModeBtn" type="button" title="测验模式">全开</button>
                  <button class="btn btn-quiz" id="embedQuizBtn" type="button" title="做题">题</button>
                  <span class="frame-ind" id="embedFrameInd"></span>
                  <button class="btn" id="embedRestartBtn" type="button" title="重新开始">↺</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>

      <aside class="vp-rail" id="rightRail">
        <nav class="vp-rail-block" id="docTocBlock" hidden>
          <p class="vp-rail-title">本页目录</p>
          <div class="vp-rail-toc" id="docToc"></div>
        </nav>
      </aside>
    </div>
  </div>

  <script src="shared/hub-catalog.js"></script>
  <script src="shared/wrong-book.js"></script>
  <script src="shared/vml.js?v=2"></script>
  <script src="shared/vml-strict.js?v=2"></script>
  <script src="shared/code-highlight.js"></script>
  <script src="shared/vml-rich.js"></script>
  <script src="shared/quiz-parse.js"></script>
  <script src="shared/narrate-parse.js"></script>
  <script src="shared/quiz-engine.js"></script>
  <script src="shared/lesson-engine.js"></script>
  <script src="shared/lesson-narrator.js"></script>
  <script src="shared/lesson-quiz.js"></script>
  <script src="shared/lesson-viewport.js"></script>
  <script src="shared/lesson-transport.js"></script>
  <script src="shared/lesson-player.js"></script>
  <script src="shared/hub-embed-player.js"></script>
  <script src="shared/hub-docs.js"></script>
  <script>
    HubPrefs.mount(document.getElementById('prefMount'));
    HubEmbedPlayer.init();
    HubDocs.init();
  </script>
</body>
</html>
