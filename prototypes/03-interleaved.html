<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C · 穿插微课 · 缓存击穿</title>
  <style>
    :root {
      --bg: #0c0a09;
      --card: #1c1917;
      --border: #3f3a36;
      --text: #fafaf9;
      --muted: #a8a29e;
      --accent: #fb923c;
      --ok: #4ade80;
      --bad: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .top { max-width: 560px; margin: 0 auto 1rem; display: flex; justify-content: space-between; }
    .top a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
    .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: #2a1a0a; color: var(--accent); border: 1px solid #5c3a1a; }
    .main { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .hint { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      min-height: 280px;
    }
    .phase-tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .phase-tag.quiz { color: #a78bfa; }
    .content { font-size: 1rem; line-height: 1.75; }
    .content em { color: var(--accent); font-style: normal; font-weight: 600; }
    .timer {
      height: 3px;
      background: #292524;
      border-radius: 2px;
      margin: 1.25rem 0;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width linear;
    }
    .opts { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .opt {
      padding: 0.75rem 1rem;
      background: #0c0a09;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: left;
      color: var(--text);
      font-family: inherit;
    }
    .opt:hover { border-color: #57534e; }
    .opt.ok { border-color: var(--ok); background: #0a1f12; }
    .opt.no { border-color: var(--bad); background: #1f0a0a; }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .streak { color: var(--ok); }
    .result {
      text-align: center;
      padding: 2rem 1rem;
      display: none;
    }
    .result.show { display: block; }
    .result h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .result p { color: var(--muted); line-height: 1.6; }
    .btn {
      margin-top: 1.25rem;
      padding: 0.65rem 1.5rem;
      background: var(--accent);
      color: #1a0a00;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="top">
    <a href="../index.html">← 返回对比页</a>
    <span class="badge">Prototype C · 穿插微课</span>
  </div>
  <div class="main">
    <h1>缓存击穿 · 讲一题做一题</h1>
    <p class="hint">考研节奏：微课 15 秒 → 立刻做题 → 再微课。不能连续看。</p>

    <div class="card" id="card">
      <div class="phase-tag" id="phaseTag">微课 1/4</div>
      <div class="content" id="content"></div>
      <div class="timer"><div class="timer-fill" id="timerFill"></div></div>
      <div class="opts" id="opts" style="display:none"></div>
      <div class="footer">
        <span id="stepInfo">步骤 1 / 8</span>
        <span class="streak" id="streak"></span>
      </div>
    </div>

    <div class="card result" id="result">
      <h2 id="resultTitle">完成</h2>
      <p id="resultText"></p>
      <button class="btn" onclick="location.reload()">再练一遍</button>
    </div>
  </div>

  <script>
    const flow = [
      { type: 'teach', text: '缓存击穿 = <em>热点 key 过期</em>的那一刻，大量请求同时发现缓存没了。' },
      { type: 'quiz', q: '击穿的触发条件是？', opts: ['Redis 宕机', '热点 key 过期', '查询不存在的 id', '内存满了'], ok: 1 },
      { type: 'teach', text: '因为没防护，每个 miss 的请求都<em>独立查 DB</em>，同一热点可能被查上千次。' },
      { type: 'quiz', q: '无防护时，1000 并发 miss 会打 DB 几次？', opts: ['1 次', '10 次', '1000 次', '0 次'], ok: 2 },
      { type: 'teach', text: '<em>互斥锁</em>：只允许一个线程查库回填，其余等待或重试。' },
      { type: 'quiz', q: '互斥锁解决的核心问题是？', opts: ['防止缓存穿透', '防止并发重复查库', '防止雪崩', '加快 Redis'], ok: 1 },
      { type: 'teach', text: '<em>逻辑过期</em>：key 不真删，后台异步更新，用户永远能读到值（可能略旧）。' },
      { type: 'quiz', q: '逻辑过期和互斥锁的区别？', opts: ['逻辑过期不需要 Redis', '逻辑过期用户不会 miss', '互斥锁更快', '没区别'], ok: 1 },
    ];

    let i = 0, correct = 0;
    const content = document.getElementById('content');
    const opts = document.getElementById('opts');
    const phaseTag = document.getElementById('phaseTag');
    const timerFill = document.getElementById('timerFill');
    const stepInfo = document.getElementById('stepInfo');
    const streak = document.getElementById('streak');

    function show() {
      if (i >= flow.length) {
        document.getElementById('card').style.display = 'none';
        const r = document.getElementById('result');
        r.classList.add('show');
        document.getElementById('resultTitle').textContent = correct >= 3 ? '穿插节奏适合你' : '建议多走几遍';
        document.getElementById('resultText').textContent =
          `4 道小题对了 ${correct} 道。` +
          (correct >= 3 ? '「刚讲完就做题」能唤起记忆 — 这就是考研刷题节奏。' : '回去试试 A 因果链或 B 沙箱。');
        return;
      }
      const item = flow[i];
      opts.style.display = 'none';
      opts.innerHTML = '';
      stepInfo.textContent = `步骤 ${i + 1} / ${flow.length}`;

      if (item.type === 'teach') {
        const teachNum = flow.slice(0, i + 1).filter(x => x.type === 'teach').length;
        phaseTag.textContent = `微课 ${teachNum}/4`;
        phaseTag.className = 'phase-tag';
        content.innerHTML = item.text;
        timerFill.style.transition = 'width 3s linear';
        timerFill.style.width = '0%';
        requestAnimationFrame(() => { timerFill.style.width = '100%'; });
        setTimeout(() => { i++; show(); }, 3200);
      } else {
        phaseTag.textContent = '立刻做题';
        phaseTag.className = 'phase-tag quiz';
        content.textContent = item.q;
        timerFill.style.width = '0%';
        opts.style.display = 'flex';
        item.opts.forEach((t, j) => {
          const b = document.createElement('button');
          b.className = 'opt';
          b.textContent = t;
          b.onclick = () => {
            const ok = j === item.ok;
            b.classList.add(ok ? 'ok' : 'no');
            if (ok) { correct++; streak.textContent = `✓ 连对感 ${correct}`; }
            else streak.textContent = '✗ 刚讲过，回去想 5 秒';
            opts.querySelectorAll('.opt').forEach(x => x.disabled = true);
            setTimeout(() => { i++; show(); }, 1200);
          };
          opts.appendChild(b);
        });
      }
    }
    show();
  </script>
</body>
</html>
